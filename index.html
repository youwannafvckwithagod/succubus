<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyeami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .haze-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .haze {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            mix-blend-mode: screen;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .haze-1 {
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.4) 0%, rgba(0, 0, 0, 0) 70%);
            top: -20%;
            left: -10%;
        }

        .haze-2 {
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(107, 33, 168, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -15%;
            right: -10%;
        }

        .chain-container {
            position: fixed;
            top: -22.4vh;
            height: 45vh; 
            z-index: 4;
            pointer-events: none;
            opacity: 0.35;
        }

        .chain-left {
            left: 0;
        }

        .chain-right {
            right: 0;
            transform: scaleX(-1);
        }

        .chain-img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .char-container {
            position: fixed;
            bottom: 0;
            height: 74vh;
            z-index: 5;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            will-change: transform;
        }

        .char-left { left: -4%; }
        .char-right { right: -4%; }

        .char-img {
            height: 100%;
            width: auto;
            object-fit: contain;
            opacity: 0.5;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        #char-left-img { filter: drop-shadow(0 0 45px rgba(255, 182, 193, 0.45)); }
        #char-right-img { filter: drop-shadow(0 0 45px rgba(220, 20, 60, 0.45)); }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 6px; 
            align-items: center;
        }

        .social-link {
            display: inline-block;
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.45);
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            font-weight: 300;
            padding: 2px 0;
        }

        .social-link:hover {
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .fade-in { animation: fadeIn 2.5s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="haze-container">
        <div class="haze haze-1"></div>
        <div class="haze haze-2"></div>
    </div>

    <div class="chain-container chain-left">
        <img src="https://thumbs.wbm.im/pw/small/2ecdec75ea6e690188f8743927288847.png" class="chain-img" onerror="this.style.display='none'">
    </div>

    <div class="chain-container chain-right">
        <img src="https://thumbs.wbm.im/pw/small/2ecdec75ea6e690188f8743927288847.png" class="chain-img" onerror="this.style.display='none'">
    </div>

    <div class="char-container char-left">
        <img src="https://www.pngall.com/wp-content/uploads/15/Astolfo-PNG-Image.png" alt="Astolfo" class="char-img" id="char-left-img" onerror="this.style.display='none'">
    </div>

    <div class="char-container char-right">
        <img src="https://www.pngall.com/wp-content/uploads/14/Hu-Tao-PNG-Images-HD.png" alt="Hu Tao" class="char-img" id="char-right-img" onerror="this.style.display='none'">
    </div>

    <div class="content fade-in">
        <nav class="links-container">
            <a href="https://discord.com/users/yyeami" target="_blank" class="social-link">discord</a>
            <a href="https://t.me/yyeami" target="_blank" class="social-link">telegram</a>
            <a href="https://steamcommunity.com/id/tiredofinsomnia/" target="_blank" class="social-link">steam</a>
            <a href="https://on.soundcloud.com/G7i2zUVNXItet0Yp35" target="_blank" class="social-link">soundcloud</a>
            <a href="https://github.com/youwannafvckwithagod" target="_blank" class="social-link">github</a>
            <a href="https://stratz.com/players/1673888785" target="_blank" class="social-link">stratz</a>
        </nav>
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            
            const haze1 = document.querySelector('.haze-1');
            const haze2 = document.querySelector('.haze-2');
            if(haze1 && haze2) {
                haze1.style.transform = `translate(${x * 60}px, ${y * 60}px)`;
                haze2.style.transform = `translate(${-x * 60}px, ${y * 60}px)`;
            }

            const charLeft = document.getElementById('char-left-img');
            const charRight = document.getElementById('char-right-img');

            if(charLeft) charLeft.style.transform = `translate(${x * 20}px, ${y * 10}px)`;
            if(charRight) charRight.style.transform = `translate(${x * 20}px, ${y * 10}px)`;
        });
    </script>
</body>
</html>
